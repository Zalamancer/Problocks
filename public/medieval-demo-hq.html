<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medieval Village — ORIGINAL QUALITY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#hud{position:absolute;top:16px;left:16px;pointer-events:none;z-index:10}
#hud .label{color:#e8d5a3;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
#fps{position:absolute;top:16px;right:16px;color:#8f8;font-size:11px;font-family:monospace;pointer-events:none;z-index:10;text-shadow:0 1px 3px #000;text-align:right;line-height:1.7;background:rgba(0,0,0,0.4);padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06)}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none;z-index:10;opacity:0.4}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#prompt{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#e8d5a3;font-size:15px;background:rgba(0,0,0,0.5);padding:10px 24px;border-radius:20px;border:1px solid rgba(232,213,163,0.15);z-index:10;pointer-events:none}
#loading{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a2a3a;z-index:100;flex-direction:column;gap:12px}
#loading .text{color:#8ba;font-size:16px;letter-spacing:0.1em}
#loading .bar{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
#loading .fill{height:100%;background:#4a7a5a;border-radius:2px;transition:width 0.3s}
</style>
</head>
<body>
<div id="loading"><div class="text">Loading Village...</div><div class="bar"><div class="fill" id="load-fill" style="width:0%"></div></div></div>
<div id="hud"><div class="label">WASD Move | Mouse Look | Shift Sprint</div></div>
<div id="fps"></div>
<div id="crosshair"></div>
<div id="prompt">Click to explore</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
<script>
'use strict';

// ── Performance-first setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0xa0c4e8, 0.018);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true }); // no AA = big perf win
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); // fixed 1x = fastest
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

document.body.prepend(renderer.domElement);

// Full quality lighting with shadows
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a5a3a, 0.6));
scene.add(new THREE.AmbientLight(0x404060, 0.3));
const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 120;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);

// Warm fills
[[0,2.5,0],[6,2.5,-4],[-6,2.5,4]].forEach(([x,y,z])=>{
  const p = new THREE.PointLight(0xff9944, 0.4, 15);
  p.position.set(x,y,z); scene.add(p);
});

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x5a8a4a, roughness:0.9})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ── Player ──
const player = {x:0, z:3, speed:6};
const pGroup = new THREE.Group();
const pTorso = new THREE.Mesh(new THREE.BoxGeometry(.5,.7,.35), new THREE.MeshLambertMaterial({color:0x3a6a9a}));
pTorso.position.set(0,1.1,0); pGroup.add(pTorso);
const pHead = new THREE.Mesh(new THREE.BoxGeometry(.35,.35,.35), new THREE.MeshLambertMaterial({color:0xf5c6a0}));
pHead.position.set(0,1.65,0); pGroup.add(pHead);
const pHat = new THREE.Mesh(new THREE.ConeGeometry(.25,.4,5), new THREE.MeshLambertMaterial({color:0x6a3a2a}));
pHat.position.set(0,2.0,0); pGroup.add(pHat);
const legs=[];
[-0.12,0.12].forEach(ox=>{
  const l=new THREE.Mesh(new THREE.BoxGeometry(.15,.5,.2), new THREE.MeshLambertMaterial({color:0x5a4a3a}));
  l.position.set(ox,.45,0); pGroup.add(l); legs.push(l);
});
pGroup.position.set(0,0,3);
scene.add(pGroup);

// ── Input ──
const keys={};
let camYaw=0, camPitch=-0.3;
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});
document.addEventListener('mousemove',e=>{
  if(document.pointerLockElement){
    camYaw+=e.movementX*0.003;
    camPitch=Math.max(-0.8,Math.min(0.4,camPitch+e.movementY*0.003));
  }
});
renderer.domElement.addEventListener('click',()=>{
  renderer.domElement.requestPointerLock();
  document.getElementById('prompt').style.display='none';
});

// ── Optimized model loading + geometry merging ──
const gltf = new THREE.GLTFLoader();
const cache = {};
let total=0, loaded=0;

// Collect all meshes to merge after loading
const pendingMeshes = [];
let allLoaded = false;

function loadM(name, x, y, z, ry, s) {
  total++;
  const url='/assets/medieval-hq/'+name+'.gltf';
  const promise = cache[url]
    ? Promise.resolve(cache[url].clone())
    : new Promise((res,rej)=>{
        gltf.load(url, g=>{
          g.scene.traverse(c=>{
            if(c.isMesh){
              c.castShadow=true;c.receiveShadow=true;
            }
          });
          cache[url]=g.scene;
          res(g.scene.clone());
        }, undefined, rej);
      });

  promise.then(mesh=>{
    mesh.position.set(x, y||0, z);
    if(ry) mesh.rotation.y=ry;
    mesh.scale.setScalar(s||2);
    // Don't add to scene yet — collect for merging
    mesh.updateMatrixWorld(true);
    pendingMeshes.push(mesh);
    loaded++;
    updateLoad();
  }).catch(()=>{loaded++;updateLoad()});
}

function updateLoad(){
  const p=total>0?Math.round(loaded/total*100):0;
  const f=document.getElementById('load-fill');
  if(f) f.style.width=p+'%';

  if(loaded>=total && !allLoaded){
    allLoaded=true;
    mergeMeshes();
    setTimeout(()=>{const e=document.getElementById('loading');if(e)e.style.display='none'},200);
  }
}

// Merge all loaded meshes into minimal draw calls (grouped by material)
function mergeMeshes() {
  const materialGroups = new Map(); // material.uuid → {material, geometries[]}

  for (const root of pendingMeshes) {
    root.traverse(child => {
      if (!child.isMesh) return;
      const mat = child.material;
      const key = mat.uuid;
      if (!materialGroups.has(key)) {
        materialGroups.set(key, { material: mat, geometries: [] });
      }
      // Apply world transform to geometry
      const geo = child.geometry.clone();
      geo.applyMatrix4(child.matrixWorld);
      materialGroups.get(key).geometries.push(geo);
    });
  }

  // Merge each material group into one mesh
  let drawCalls = 0;
  for (const [, group] of materialGroups) {
    if (group.geometries.length === 0) continue;
    try {
      const merged = THREE.BufferGeometryUtils.mergeBufferGeometries(group.geometries, false);
      if (merged) {
        const mesh = new THREE.Mesh(merged, group.material);
        scene.add(mesh);
        drawCalls++;
      }
    } catch(e) {
      // Fallback: add individually if merge fails (different attributes)
      for (const geo of group.geometries) {
        scene.add(new THREE.Mesh(geo, group.material));
        drawCalls++;
      }
    }
  }

  console.log('[Perf] Merged ' + pendingMeshes.length + ' models into ' + drawCalls + ' draw calls');
  pendingMeshes.length = 0;
}

// === BUILD VILLAGE (same layout, loaded once then merged) ===

// Front building
loadM('Wall_Plaster_Straight',-6,0,-8);
loadM('Wall_Plaster_Straight',-4,0,-8);
loadM('Wall_Plaster_Door_Round',-2,0,-8);
loadM('Wall_Plaster_Straight',0,0,-8);
loadM('Wall_Plaster_Window_Wide_Round',2,0,-8);
loadM('Wall_Plaster_Straight',4,0,-8);

// Second floor
loadM('Wall_Plaster_Straight',-6,4,-8);
loadM('Wall_Plaster_Window_Wide_Round',-4,4,-8);
loadM('Wall_Plaster_Straight',-2,4,-8);
loadM('Wall_Plaster_Window_Wide_Round',0,4,-8);

// Right wall
loadM('Wall_UnevenBrick_Straight',6,0,-8,Math.PI/2);
loadM('Wall_UnevenBrick_Straight',6,0,-6,Math.PI/2);
loadM('Wall_UnevenBrick_Door_Flat',6,0,-4,Math.PI/2);

// Left wall
loadM('Wall_UnevenBrick_Straight',-8,0,-6,-Math.PI/2);
loadM('Wall_UnevenBrick_Straight',-8,0,-4,-Math.PI/2);

// Back building
loadM('Wall_Plaster_Straight',-6,0,6,Math.PI);
loadM('Wall_Plaster_Door_Flat',-4,0,6,Math.PI);
loadM('Wall_Plaster_Window_Wide_Round',-2,0,6,Math.PI);
loadM('Wall_Plaster_Straight',0,0,6,Math.PI);

// Right building
loadM('Wall_Plaster_Straight',10,0,2,Math.PI/2);
loadM('Wall_Plaster_Door_Round',10,0,4,Math.PI/2);

// Roof
loadM('Roof_RoundTiles_8x8',-1,7.8,-8);

// Props (fewer = faster)
loadM('Prop_Crate',-1,0,-3,0,2);
loadM('Prop_Crate',-.3,0,-2.6,.4,1.8);
loadM('Prop_Wagon',5,0,1,-.3,2);
loadM('Prop_WoodenFence_Single',-12,0,-1,0,2);
loadM('Prop_WoodenFence_Single',-12,0,1,0,2);
loadM('Prop_WoodenFence_Single',-12,0,3,0,2);
loadM('Prop_Chimney',-5,7.8,-8,0,2);
loadM('Prop_Vine1',-6,1,-7.8,0,2);
loadM('Prop_Support',5,0,-7,0,2);

// Stairs
loadM('Stairs_Exterior_Straight',-2,0,-6,0,2);

// Balcony
loadM('Balcony_Simple_Straight',-4,4,-7.5,0,2);

// Floor tiles (only center, not full grid)
for(let x=-2;x<=2;x+=2)for(let z=-2;z<=2;z+=2) loadM('Floor_Brick',x,0.01,z,0,2);

// Corners
loadM('Corner_Exterior_Brick',6,0,-8,0,2);
loadM('Corner_Exterior_Wood',-8,0,-8,0,2);

// Door + shutters
loadM('DoorFrame_Round_Brick',-2,0,-7.9,0,2);
loadM('Door_1_Round',-2,0,-7.85,0,2);
loadM('WindowShutters_Wide_Round_Open',2,0,-7.9,0,2);

// === GAME LOOP ===
let elapsed=0, frames=0, lastFpsUpdate=0;
const clock=new THREE.Clock();
const fpsEl=document.getElementById('fps');

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  elapsed+=dt;

  // Stats overlay
  frames++;
  if(elapsed-lastFpsUpdate>0.5){
    const ri = renderer.info.render;
    const mi = renderer.info.memory;
    fpsEl.innerHTML =
      '<b>' + Math.round(frames/(elapsed-lastFpsUpdate)) + ' FPS</b> (HQ)<br>' +
      'Draw calls: ' + ri.calls + '<br>' +
      'Triangles: ' + ri.triangles.toLocaleString() + '<br>' +
      'Vertices: ' + (ri.triangles * 3).toLocaleString() + '<br>' +
      'Geometries: ' + mi.geometries + '<br>' +
      'Textures: ' + mi.textures + '<br>' +
      'Scene objects: ' + scene.children.length;
    frames=0; lastFpsUpdate=elapsed;
  }

  // Movement
  let mx=0,mz=0;
  if(keys['KeyW'])mz-=1;if(keys['KeyS'])mz+=1;
  if(keys['KeyA'])mx-=1;if(keys['KeyD'])mx+=1;
  const spd=keys['ShiftLeft']?player.speed*1.8:player.speed;
  if(mx||mz){
    const len=Math.sqrt(mx*mx+mz*mz);mx/=len;mz/=len;
    player.x+=(mx*Math.cos(camYaw)-mz*Math.sin(camYaw))*spd*dt;
    player.z+=(mx*Math.sin(camYaw)+mz*Math.cos(camYaw))*spd*dt;
    legs[0].position.y=.45+Math.sin(elapsed*8)*.08;
    legs[1].position.y=.45+Math.sin(elapsed*8+Math.PI)*.08;
  }
  // Clamp to world
  player.x=Math.max(-40,Math.min(40,player.x));
  player.z=Math.max(-40,Math.min(40,player.z));

  pGroup.position.set(player.x,0,player.z);
  pGroup.rotation.y=camYaw+Math.PI;

  camera.position.set(
    player.x-Math.sin(camYaw)*10,
    5-camPitch*3,
    player.z-Math.cos(camYaw)*10
  );
  camera.lookAt(player.x,1.5,player.z);

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
