<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocky Village</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; width:100vw; height:100vh; background:#5ecfff; }
#overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:rgba(0,0,0,.45);
  color:#fff; z-index:10; gap:8px; cursor:pointer;
}
#overlay h2 { font-size:28px; font-weight:900; letter-spacing:.05em; text-shadow:0 3px 0 rgba(0,0,0,.4); }
#overlay p  { font-size:13px; opacity:.75; }
#crosshair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:16px; height:16px; pointer-events:none; display:none; z-index:5;
}
#crosshair::before,#crosshair::after { content:''; position:absolute; background:#fff; border-radius:2px; }
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
#hud {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.6); font-size:11px; font-weight:600; letter-spacing:.08em;
  pointer-events:none; display:none; z-index:5; text-shadow:0 1px 4px rgba(0,0,0,.5);
}
</style>
</head>
<body>
<div id="overlay">
  <h2>🏰 Blocky Village</h2>
  <p>Click to explore · WASD move · Mouse look · ESC pause</p>
</div>
<div id="crosshair"></div>
<div id="hud">WASD · MOVE &nbsp; MOUSE · LOOK &nbsp; ESC · PAUSE</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
// ─── Renderer ─────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x5ecfff);
scene.fog = new THREE.Fog(0x5ecfff, 40, 110);

var camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 3.5, 14);

window.addEventListener('resize', function() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Pointer lock ─────────────────────────────────────────────────────────
var overlay   = document.getElementById('overlay');
var crosshair = document.getElementById('crosshair');
var hud       = document.getElementById('hud');
var keys = {}, locked = false, yaw = 0, pitch = 0;

overlay.addEventListener('click', function() { renderer.domElement.requestPointerLock(); });
document.addEventListener('pointerlockchange', function() {
  locked = document.pointerLockElement === renderer.domElement;
  overlay.style.display   = locked ? 'none' : 'flex';
  crosshair.style.display = locked ? 'block' : 'none';
  hud.style.display       = locked ? 'block' : 'none';
});
document.addEventListener('mousemove', function(e) {
  if (!locked) return;
  yaw -= e.movementX * 0.0025;
  pitch = Math.max(-1.1, Math.min(1.1, pitch - e.movementY * 0.0025));
});
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });

// ─── Color palette ────────────────────────────────────────────────────────
var C = {
  grass:   0x4ecf4e,
  dirt:    0xc8a464,
  wall:    0xf5e6c8,   // warm cream
  wall2:   0xe8d5b0,
  roof:    0xe84040,   // bright red
  roof2:   0xc83030,
  door:    0xa0600a,
  doorInner: 0x7a4808,
  window:  0x80d0ff,
  winFrame:0x5a3808,
  chimney: 0xd46030,
  tree1:   0x40c840,
  tree2:   0x30a830,
  tree3:   0x58e058,
  trunk:   0xa05018,
  path:    0xd4a060,
  fence:   0xd4aa70,
  flower1: 0xff4488,
  flower2: 0xffdd00,
  flower3: 0xff8800,
  cloud:   0xffffff,
  water:   0x40aaff,
  stone:   0xaaa090,
};

// ─── Material cache ───────────────────────────────────────────────────────
var mats = {};
function mat(hex, opts) {
  var key = hex + JSON.stringify(opts||{});
  if (!mats[key]) {
    var o = Object.assign({ color: hex, roughness: .85, metalness: 0 }, opts||{});
    mats[key] = new THREE.MeshStandardMaterial(o);
  }
  return mats[key];
}

// ─── Builder helpers ──────────────────────────────────────────────────────
function box(w, h, d, color, opts) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(color, opts));
  m.castShadow = m.receiveShadow = true;
  return m;
}
function sphere(r, color, opts) {
  var m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), mat(color, opts));
  m.castShadow = m.receiveShadow = true;
  return m;
}
function cyl(rt, rb, h, color, segs) {
  var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs||8), mat(color));
  m.castShadow = m.receiveShadow = true;
  return m;
}
function add(obj, px, py, pz, parent) {
  obj.position.set(px, py, pz);
  (parent || scene).add(obj);
  return obj;
}
function clone(obj) { return obj.clone(); }

// ─── Ground ───────────────────────────────────────────────────────────────
var ground = add(box(200, 1, 200, C.grass), 0, -0.5, 0);

// Dirt path from gate to door
add(box(3, 0.05, 16, C.dirt), 0, 0.02, 5);

// Pond
var pond = add(cyl(.01, 3.5, 0.15, C.water, 20), -10, 0.06, -4);

// ─── Clouds (decorative boxes) ────────────────────────────────────────────
var clouds = [];
function makeCloud(cx, cy, cz) {
  var g = new THREE.Group();
  [[0,0,0,3.5,1.4,2.2],[1.4,.5,0,2.2,1.1,1.8],[-1.3,.3,0,2,1,1.5],[0,-.1,1,2.8,1,1.2]].forEach(function(b){
    var p = add(box(b[3],b[4],b[5],C.cloud), b[0],b[1],b[2], g);
    p.castShadow = false;
  });
  g.position.set(cx, cy, cz);
  scene.add(g);
  clouds.push({ g: g, speed: .6+Math.random()*.8, baseY: cy });
  return g;
}
makeCloud(-20, 22, -15);
makeCloud( 15, 25, -20);
makeCloud(  5, 20, -30);
makeCloud(-30, 23, -10);
makeCloud( 25, 22, -5);

// ─── Main house ───────────────────────────────────────────────────────────
var HW=5, HH=4, HD=5.5;
var house = new THREE.Group();

// Walls (chunky, slightly rounded look via scaling)
add(box(HW,   HH,   0.5,  C.wall),  0,  HH/2, -HD/2, house); // back
add(box(0.5,  HH,   HD,   C.wall), -HW/2, HH/2, 0,   house); // left
add(box(0.5,  HH,   HD,   C.wall),  HW/2, HH/2, 0,   house); // right

// Front: two side columns + top, leaving door+window gaps
add(box(1.3,  HH,   0.5, C.wall), -HW/2+.65, HH/2, HD/2, house);
add(box(1.3,  HH,   0.5, C.wall),  HW/2-.65, HH/2, HD/2, house);
add(box(2.4,  .9,   0.5, C.wall2),       0, HH-.45, HD/2, house); // above door
// Side strips next to windows
add(box(.55, HH, 0.5, C.wall), -HW/2+2.2, HH/2, HD/2, house);
add(box(.55, HH, 0.5, C.wall),  HW/2-2.2, HH/2, HD/2, house);
add(box(1.5, 1.1, 0.5, C.wall), -HW/2+2.2, .55, HD/2, house);
add(box(1.5, 1.1, 0.5, C.wall),  HW/2-2.2, .55, HD/2, house);
add(box(1.5, .55, 0.5, C.wall), -HW/2+2.2, HH-.28, HD/2, house);
add(box(1.5, .55, 0.5, C.wall),  HW/2-2.2, HH-.28, HD/2, house);

// Floor
add(box(HW-.5, .2, HD-.5, mat(C.dirt)), 0, .1, 0, house);

// ── Door (bright, chunky) ──────────────────────────────────────────────
var doorGroup = new THREE.Group();
// Frame
add(box(.25,2.7,.55,C.winFrame), -.68, 1.35, HD/2, house);
add(box(.25,2.7,.55,C.winFrame),  .68, 1.35, HD/2, house);
add(box(1.61,.3,.55,C.winFrame),   0, 2.85, HD/2, house);
// Door panel (bright orange-brown, slightly open)
var doorPanel = add(box(1.2, 2.55, .15, C.door), -.68-.6+.04, 1.27, HD/2-.05, house);
doorPanel.rotation.y = Math.PI*.35;
// Handle
var handle = add(sphere(.12, 0xffdd00), .58, 1.3, HD/2+.12, house);

// ── Windows (big + bright) ─────────────────────────────────────────────
function addWindow(wx, wy, wz, hor) {
  var wMat = mat(C.window, { transparent:true, opacity:.75, roughness:.05, metalness:.1, emissive:0xfff4c0, emissiveIntensity:.4 });
  var glass = new THREE.Mesh(new THREE.BoxGeometry(hor?0.1:1.2, 1.3, hor?1.2:0.1), wMat);
  glass.position.set(wx, wy, wz);
  glass.castShadow = false;
  house.add(glass);
  // Thick chunky frame
  var fw = hor ? 1.4 : 0.15, fh = hor ? 0.15 : 1.5, fd = hor ? 0.15 : 1.4;
  [wy+.75,wy-.75].forEach(function(fy){
    add(box(hor?1.4:.15, .18, hor?.18:1.4, C.winFrame), wx, fy, wz, house);
  });
  [wx-.7, wx+.7].forEach(function(fx){
    add(box(.18, 1.5, hor?1.4:.18, C.winFrame), fx, wy, wz, house);
  });
  // Cross divider
  add(box(hor?.08:1.2,.1,hor?1.2:.08,C.winFrame), wx, wy, wz, house);
  add(box(hor?1.2:.1,.08,hor?.1:1.2,C.winFrame), wx, wy, wz, house);
}
addWindow(-HW/2+2.2, 1.8, HD/2+.01, false);
addWindow( HW/2-2.2, 1.8, HD/2+.01, false);
addWindow(-HW/2+.01, 1.8, 0, true);
addWindow( HW/2-.01, 1.8, 0, true);

// ── Roof (big red pyramid-ish, chunky) ────────────────────────────────
var roofH = 2.8;
var roofGroup = new THREE.Group();
roofGroup.position.set(0, HH, 0);

// Two thick slanted roof panels front+back
var slopeFB = Math.atan2(roofH, HD/2);
var lenFB   = Math.sqrt(roofH*roofH + (HD/2)*(HD/2)) + .3;
var slopeLR = Math.atan2(roofH, HW/2);
var lenLR   = Math.sqrt(roofH*roofH + (HW/2)*(HW/2)) + .3;

var rp1=add(box(HW+1.2,.4,lenFB,C.roof),  0,0, HD/2*.38+.05, roofGroup); rp1.rotation.x=-slopeFB;
var rp2=add(box(HW+1.2,.4,lenFB,C.roof),  0,0,-HD/2*.38-.05, roofGroup); rp2.rotation.x= slopeFB;
var rp3=add(box(lenLR,.4,HD+1.2,C.roof2),-HW/2*.38-.05,0,0, roofGroup); rp3.rotation.z= slopeLR;
var rp4=add(box(lenLR,.4,HD+1.2,C.roof2), HW/2*.38+.05,0,0, roofGroup); rp4.rotation.z=-slopeLR;

// Ridge cap
add(box(HW+1.4,.55,.55,C.roof2), 0, roofH+.22, 0, roofGroup);
// Eave blocks
add(box(HW+1.5,.45,.45,C.roof2), 0, -.1, HD/2+.22, roofGroup);
add(box(HW+1.5,.45,.45,C.roof2), 0, -.1,-HD/2-.22, roofGroup);

// Gable end fills (triangular fill using tall thin boxes)
for(var gi=0;gi<6;gi++){
  var gf=gi/5, gy=gf*roofH, gw=(1-gf)*(HW+1.2);
  var gs=add(box(gw,.38,.38,C.wall2), 0,gy,HD/2+.25, roofGroup);
  var gs2=gs.clone(); gs2.position.z=-HD/2-.25; roofGroup.add(gs2);
}

scene.add(roofGroup);
scene.add(house);

// ── Chimney (big bright orange) ────────────────────────────────────────
var chim = new THREE.Group();
add(box(1.2,3.5,1.2,C.chimney), 0,0,0, chim);
add(box(1.6,.4,1.6,C.chimney), 0,1.8,0, chim);
chim.position.set(1.5, HH+.5, -HD/2+.8);
scene.add(chim);

// ─── Second smaller house (neighbour) ────────────────────────────────────
var h2 = new THREE.Group();
var H2W=3.8, H2H=3, H2D=3.8;
add(box(H2W,H2H,H2D,0xe0c8ff), 0,H2H/2,0, h2); // purple walls
// Roof
var r2g = new THREE.Group();
r2g.position.set(0,H2H,0);
var sl2=Math.atan2(2,H2D/2), l2=Math.sqrt(4+H2D*H2D/4)+.2;
var sl2x=Math.atan2(2,H2W/2), l2x=Math.sqrt(4+H2W*H2W/4)+.2;
add(box(H2W+.8,.35,l2,0xff9900),0,0,H2D/2*.38,r2g).rotation.x=-sl2;
add(box(H2W+.8,.35,l2,0xff9900),0,0,-H2D/2*.38,r2g).rotation.x=sl2;
add(box(l2x,.35,H2D+.8,0xe06600),0,0,0,r2g).position.x=-H2W/2*.38; r2g.children[r2g.children.length-1].rotation.z=sl2x;
add(box(l2x,.35,H2D+.8,0xe06600),0,0,0,r2g).position.x=H2W/2*.38;  r2g.children[r2g.children.length-1].rotation.z=-sl2x;
add(box(H2W+.9,.45,.35,0xe06600),0,-.05,H2D/2+.15,r2g);
add(box(H2W+.9,.45,.35,0xe06600),0,-.05,-H2D/2-.15,r2g);
add(box(H2W+.9,.45,.35,0xff6600),0,1.95+.15,0,r2g);
h2.add(r2g);
// Door
add(box(.9,1.8,.2,0x60a020),0,.9,H2D/2+.05, h2);
// Window
var wMat2=mat(C.window,{transparent:true,opacity:.8,roughness:.05,emissive:0xfff4c0,emissiveIntensity:.35});
var win2=new THREE.Mesh(new THREE.BoxGeometry(.8,1,.1),wMat2);
win2.position.set(-1.2,1.6,H2D/2+.06); h2.add(win2);
h2.position.set(-9.5, 0, -3);
scene.add(h2);

// ─── Tower ───────────────────────────────────────────────────────────────
var tower = new THREE.Group();
add(box(3,8,3,0xb8c8d8),0,4,0,tower);
// Battlements
for(var bi=0;bi<4;bi++){
  var ba=bi*Math.PI/2;
  var bx=Math.sin(ba)*1.5, bz=Math.cos(ba)*1.5;
  add(box(.7,.9,.7,0xa0b0c0),bx,8.45,bz,tower);
}
// Cone roof
var towerCone=new THREE.Mesh(new THREE.ConeGeometry(1.8,2.8,4),mat(0x8060c0));
towerCone.rotation.y=Math.PI/4; add(towerCone,0,9.4,0,tower);
// Window
var tWin=new THREE.Mesh(new THREE.BoxGeometry(.5,.8,.15),wMat2);
tWin.position.set(0,5,1.55); tower.add(tWin);
tower.position.set(10, 0, -8);
scene.add(tower);

// ─── Blocky trees (sphere + box trunk) ───────────────────────────────────
var bobTrees = [];
function addTree(tx, tz, s, col1, col2) {
  s = s||1;
  var g = new THREE.Group();
  var trunk = add(box(s*.7,s*2,s*.7,C.trunk), 0,s,0, g);
  // Big round canopy (2-3 overlapping spheres for blobby look)
  var c1 = add(sphere(s*1.5,col1), 0,s*2.8,0, g);
  var c2 = add(sphere(s*1.1,col2), s*.7,s*3.1,s*.3, g);
  var c3 = add(sphere(s*1.0,col1), -s*.5,s*3.3,-s*.4, g);
  g.position.set(tx,0,tz);
  scene.add(g);
  bobTrees.push({ g:g, phase: Math.random()*Math.PI*2 });
  return g;
}
addTree(-5,  6, 1.0, C.tree1, C.tree2);
addTree(-7,  2, 1.2, C.tree3, C.tree1);
addTree(-8, -2, 0.9, C.tree2, C.tree3);
addTree( 6,  4, 1.0, C.tree1, C.tree3);
addTree( 8,  0, 1.1, C.tree2, C.tree1);
addTree( 7, -5, 0.8, C.tree3, C.tree2);
addTree(-4, -8, 1.0, C.tree1, C.tree2);
addTree( 3, -9, 0.9, C.tree2, C.tree3);
addTree(-15, 3, 1.3, C.tree1, C.tree3);
addTree( 15,-2, 1.1, C.tree3, C.tree2);

// ─── Flowers (tiny bright spheres) ────────────────────────────────────────
var flowerColors=[C.flower1,C.flower2,C.flower3,0xaa44ff,0x44ffaa];
for(var fi=0;fi<35;fi++){
  var fa=Math.random()*Math.PI*2, fr=4+Math.random()*14;
  if(fr>5.5&&fr<7&&Math.abs(Math.sin(fa))<.6) continue; // skip on path
  var fc=flowerColors[fi%flowerColors.length];
  var fl=add(sphere(.15,fc),Math.cos(fa)*fr,.22,Math.sin(fa)*fr);
  add(cyl(.04,.04,.35,0x50a020,5),Math.cos(fa)*fr,.1,Math.sin(fa)*fr);
}

// ─── Fence (bright, chunky) ───────────────────────────────────────────────
function fencePost(px,pz){ add(box(.25,1.4,.25,C.fence), px,.7,pz); }
function fenceRail(x1,z1,x2,z2){
  var cx=(x1+x2)/2,cz=(z1+z2)/2;
  var len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
  var r=box(len,.18,.18,C.fence);
  r.position.set(cx,.85,cz);
  r.rotation.y=Math.atan2(x2-x1,z2-z1);
  scene.add(r);
  var r2=r.clone(); r2.position.y=.45; scene.add(r2);
}
var FSIZE=13;
for(var fpi=-FSIZE;fpi<=FSIZE;fpi+=2.5){fencePost(fpi,-FSIZE);fencePost(fpi,FSIZE);fencePost(-FSIZE,fpi);fencePost(FSIZE,fpi);}
fenceRail(-FSIZE,-FSIZE, FSIZE,-FSIZE);
fenceRail(-FSIZE, FSIZE, FSIZE, FSIZE);
fenceRail(-FSIZE,-FSIZE,-FSIZE, FSIZE);
fenceRail( FSIZE,-FSIZE, FSIZE, FSIZE);

// ─── Floating coins (collectibles) ────────────────────────────────────────
var coins=[];
[[2,1.8,3],[3.5,2.2,-2],[-2,1.5,4],[-3,2,1],[1,2.5,-3]].forEach(function(p){
  var c=add(cyl(.22,.22,.1,0xffdd00,12), p[0],p[1],p[2]);
  c.rotation.x=Math.PI/2;
  coins.push({ m:c, baseY:p[1], phase:Math.random()*Math.PI*2 });
});

// ─── Lighting ─────────────────────────────────────────────────────────────
// Bright, cheerful, no dark shadows
scene.add(new THREE.AmbientLight(0xffffff, 1.6));

var sun = new THREE.DirectionalLight(0xfffbe8, 2.2);
sun.position.set(15, 30, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=sun.shadow.camera.bottom=-25;
sun.shadow.camera.right=sun.shadow.camera.top=25;
sun.shadow.camera.far=80;
scene.add(sun);

// Fill light from opposite side (removes harsh shadows)
var fill = new THREE.DirectionalLight(0xaadcff, 1.0);
fill.position.set(-10,15,-8);
scene.add(fill);

// Window warm glows
[[-HW/2+2.2,1.8,HD/2],[HW/2-2.2,1.8,HD/2],[-HW/2,1.8,0],[HW/2,1.8,0]].forEach(function(p){
  var pl=new THREE.PointLight(0xffcc44,1.5,5); pl.position.set(p[0],p[1],p[2]); scene.add(pl);
});

// Pond shimmer
var pondLight=new THREE.PointLight(0x44aaff,1.2,6);
pondLight.position.set(-10,1,-4); scene.add(pondLight);

// ─── Smoke (white puffs above chimney) ────────────────────────────────────
var SMOKE=20, spos=new Float32Array(SMOKE*3), sphase=[];
for(var si=0;si<SMOKE;si++) sphase.push(si/SMOKE);
var sMat=new THREE.PointsMaterial({color:0xffffff,size:1.1,sizeAttenuation:true,transparent:true,opacity:.55});
var sGeo=new THREE.BufferGeometry();
sGeo.setAttribute('position',new THREE.BufferAttribute(spos,3));
scene.add(new THREE.Points(sGeo,sMat));

// ─── Camera movement ─────────────────────────────────────────────────────
var vel = new THREE.Vector3();
var dir = new THREE.Vector3();
var SPEED=6, FRIC=0.86;

// ─── Animate ─────────────────────────────────────────────────────────────
var clock=new THREE.Clock(), t=0;

function animate() {
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  t+=dt;

  // Camera
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  if (locked) {
    dir.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])    dir.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  dir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  dir.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) dir.x+=1;
    dir.normalize().applyEuler(new THREE.Euler(0,yaw,0));
    vel.x+=dir.x*SPEED*dt;
    vel.z+=dir.z*SPEED*dt;
  }
  vel.multiplyScalar(FRIC);
  camera.position.x=Math.max(-12,Math.min(12,camera.position.x+vel.x));
  camera.position.z=Math.max(-12,Math.min(12,camera.position.z+vel.z));
  camera.position.y=3.5;

  // Cloud drift
  clouds.forEach(function(cl){ cl.g.position.x=(cl.g.position.x+cl.speed*dt)%80-40; });

  // Tree gentle bob
  bobTrees.forEach(function(bt){ bt.g.rotation.z=Math.sin(t*1.2+bt.phase)*.025; });

  // Coin spin + bob
  coins.forEach(function(cn){
    cn.m.rotation.z+=dt*2;
    cn.m.position.y=cn.baseY+Math.sin(t*2+cn.phase)*.18;
  });

  // Handle bob on door
  handle.position.y=1.3+Math.sin(t*1.5)*.04;

  // Smoke
  for(var i=0;i<SMOKE;i++){
    sphase[i]=(sphase[i]+dt*.14)%1;
    var p=sphase[i];
    spos[i*3  ]=1.5+Math.sin(t*.8+i)*.35*p*3;
    spos[i*3+1]=HH+3.8+p*6;
    spos[i*3+2]=-HD/2+.8+Math.cos(t*.6+i)*.2*p*2;
  }
  sGeo.attributes.position.needsUpdate=true;
  sMat.opacity=.4+Math.sin(t)*.1;

  renderer.render(scene,camera);
}
animate();
</script>
