<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medieval Asset Viewer — Original Quality</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2a;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#info{position:absolute;top:16px;left:16px;color:#e8d5a3;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,0.8);line-height:1.8}
#info b{color:#fff}
#controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:all}
#controls button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ddd;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s}
#controls button:hover{background:rgba(255,255,255,0.2)}
#controls button.active{background:rgba(74,122,90,0.4);border-color:rgba(74,122,90,0.6);color:#8fca8f}
#model-name{position:absolute;top:16px;right:16px;color:#fff;font-size:16px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8);text-align:right}
#model-name .sub{font-size:11px;color:#888;font-weight:normal;margin-top:4px}
#nav{position:absolute;top:50%;right:16px;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;pointer-events:all}
#nav button{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ddd;font-size:18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
#nav button:hover{background:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div id="ui">
  <div id="info">
    <b>Medieval Village MegaKit</b> — Asset Viewer<br>
    Drag to rotate | Scroll to zoom<br>
    <span id="stats"></span>
  </div>
  <div id="model-name"><span id="mname">Loading...</span><div class="sub" id="msub"></div></div>
  <div id="nav">
    <button id="prev">&#8249;</button>
    <button id="next">&#8250;</button>
  </div>
  <div id="controls">
    <button class="active" data-cat="all">All (176)</button>
    <button data-cat="wall">Walls</button>
    <button data-cat="floor">Floors</button>
    <button data-cat="roof">Roofs</button>
    <button data-cat="door">Doors</button>
    <button data-cat="window">Windows</button>
    <button data-cat="stair">Stairs</button>
    <button data-cat="prop">Props</button>
    <button data-cat="corner">Corners</button>
    <button data-cat="overhang">Overhangs</button>
    <button data-cat="balcony">Balconies</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
'use strict';

// Full quality renderer — shadows, PBR, AA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3a);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 100);
camera.position.set(3, 2, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Orbit controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// Lights — full quality
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a5a3a, 0.5));
scene.add(new THREE.AmbientLight(0x404060, 0.3));

const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
sun.position.set(5, 8, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 30;
sun.shadow.camera.left = -5; sun.shadow.camera.right = 5;
sun.shadow.camera.top = 5; sun.shadow.camera.bottom = -5;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8899bb, 0.3);
fill.position.set(-3, 4, -2);
scene.add(fill);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a5a4a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const grid = new THREE.GridHelper(20, 40, 0x444466, 0x333355);
grid.position.y = 0.005;
scene.add(grid);

// All model names
const ALL_MODELS = MODELS_LIST; // injected below

// Category filter
const categories = {
  all: () => true,
  wall: n => n.startsWith('Wall_'),
  floor: n => n.startsWith('Floor_'),
  roof: n => n.startsWith('Roof_'),
  door: n => n.startsWith('Door') || n.startsWith('DoorFrame'),
  window: n => n.startsWith('Window'),
  stair: n => n.startsWith('Stair'),
  prop: n => n.startsWith('Prop_'),
  corner: n => n.startsWith('Corner_'),
  overhang: n => n.startsWith('Overhang_'),
  balcony: n => n.startsWith('Balcony_'),
};

let currentCategory = 'all';
let filteredModels = [...ALL_MODELS];
let currentIndex = 0;
let currentMesh = null;

const gltfLoader = new THREE.GLTFLoader();
const nameEl = document.getElementById('mname');
const subEl = document.getElementById('msub');
const statsEl = document.getElementById('stats');

function loadModel(name) {
  // Remove current
  if (currentMesh) {
    scene.remove(currentMesh);
    currentMesh.traverse(c => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) {
        if (c.material.map) c.material.map.dispose();
        if (c.material.normalMap) c.material.normalMap.dispose();
        c.material.dispose();
      }
    });
  }

  nameEl.textContent = name;
  subEl.textContent = 'Loading...';

  gltfLoader.load('/assets/medieval/' + name + '.gltf', gltf => {
    currentMesh = gltf.scene;

    // Enable shadows
    let triCount = 0;
    let matCount = 0;
    const mats = new Set();
    currentMesh.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true;
        c.receiveShadow = true;
        if (c.geometry.index) triCount += c.geometry.index.count / 3;
        else if (c.geometry.attributes.position) triCount += c.geometry.attributes.position.count / 3;
        mats.add(c.material.uuid);
      }
    });
    matCount = mats.size;

    // Auto-fit camera
    const box = new THREE.Box3().setFromObject(currentMesh);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2;

    controls.target.copy(center);
    camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
    controls.update();

    scene.add(currentMesh);

    subEl.textContent = `${Math.round(triCount)} tris | ${matCount} mat | ${(currentIndex+1)}/${filteredModels.length}`;
    statsEl.textContent = `Showing: ${filteredModels.length} models`;
  }, undefined, err => {
    subEl.textContent = 'Failed to load';
  });
}

function showModel(idx) {
  currentIndex = ((idx % filteredModels.length) + filteredModels.length) % filteredModels.length;
  loadModel(filteredModels[currentIndex]);
}

function setCategory(cat) {
  currentCategory = cat;
  filteredModels = ALL_MODELS.filter(categories[cat] || categories.all);
  document.querySelectorAll('#controls button').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  currentIndex = 0;
  if (filteredModels.length > 0) showModel(0);
  statsEl.textContent = `Showing: ${filteredModels.length} models`;
}

// Controls
document.getElementById('prev').addEventListener('click', () => showModel(currentIndex - 1));
document.getElementById('next').addEventListener('click', () => showModel(currentIndex + 1));
document.querySelectorAll('#controls button').forEach(b => {
  b.addEventListener('click', () => setCategory(b.dataset.cat));
});
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft') showModel(currentIndex - 1);
  if (e.code === 'ArrowRight') showModel(currentIndex + 1);
});

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Start
showModel(0);
</script>
<script>

var MODELS_LIST = [

"Corner_Exterior_Brick","Corner_Exterior_TopDown","Corner_Exterior_TopOnly","Corner_Exterior_Wood",
"Corner_ExteriorWide_Brick","Corner_ExteriorWide_Wood","Corner_Interior_Big","Corner_Interior_Small",
"Door_1_Flat","Door_1_Round","Door_2_Flat","Door_2_Round","Door_4_Flat","Door_4_Round","Door_8_Flat","Door_8_Round",
"DoorFrame_Flat_Brick","DoorFrame_Flat_WoodDark","DoorFrame_Round_Brick","DoorFrame_Round_WoodDark",
"Floor_Brick","Floor_RedBrick","Floor_UnevenBrick","Floor_WoodDark","Floor_WoodDark_Half1","Floor_WoodDark_Half2","Floor_WoodDark_Half3","Floor_WoodDark_OverhangCorner","Floor_WoodDark_OverhangCorner2","Floor_WoodLight","Floor_WoodLight_OverhangCorner","Floor_WoodLight_OverhangCorner2",
"HoleCover_90Angle","HoleCover_90Half","HoleCover_90Stairs","HoleCover_Straight","HoleCover_StraightHalf",
"Overhang_Plaster_Corner","Overhang_Plaster_Corner_Front","Overhang_Plaster_Long","Overhang_Plaster_Short","Overhang_Roof_Plaster","Overhang_Roof_UnevenBricks","Overhang_RoofIncline_Plaster","Overhang_RoofIncline_UnevenBricks","Overhang_Side_Plaster_Long_L","Overhang_Side_Plaster_Long_R","Overhang_Side_Plaster_Short_L","Overhang_Side_Plaster_Short_R","Overhang_Side_UnevenBrick_Long_L","Overhang_Side_UnevenBrick_Long_R","Overhang_Side_UnevenBrick_Short_L","Overhang_Side_UnevenBrick_Short_R","Overhang_UnevenBrick_Corner","Overhang_UnevenBrick_Corner_Front","Overhang_UnevenBrick_Long","Overhang_UnevenBrick_Short",
"Prop_Brick1","Prop_Brick2","Prop_Brick3","Prop_Brick4","Prop_Chimney","Prop_Chimney2","Prop_Crate","Prop_ExteriorBorder_Corner","Prop_ExteriorBorder_Straight1","Prop_ExteriorBorder_Straight2","Prop_MetalFence_Ornament","Prop_MetalFence_Simple","Prop_Support","Prop_Vine1","Prop_Vine2","Prop_Vine4","Prop_Vine5","Prop_Vine6","Prop_Vine9","Prop_Wagon","Prop_WoodenFence_Extension1","Prop_WoodenFence_Extension2","Prop_WoodenFence_Single",
"Roof_2x4_RoundTile","Roof_Dormer_RoundTile","Roof_Front_Brick2","Roof_Front_Brick4","Roof_Front_Brick4_Half_L","Roof_Front_Brick4_Half_R","Roof_Front_Brick6","Roof_Front_Brick6_Half_L","Roof_Front_Brick6_Half_R","Roof_Front_Brick8","Roof_Front_Brick8_Half_L","Roof_Front_Brick8_Half_R","Roof_FrontSupports","Roof_Log","Roof_Modular_RoundTiles","Roof_RoundTile_2x1","Roof_RoundTile_2x1_Long","Roof_RoundTiles_4x4","Roof_RoundTiles_4x6","Roof_RoundTiles_4x8","Roof_RoundTiles_6x10","Roof_RoundTiles_6x12","Roof_RoundTiles_6x14","Roof_RoundTiles_6x4","Roof_RoundTiles_6x6","Roof_RoundTiles_6x8","Roof_RoundTiles_8x10","Roof_RoundTiles_8x12","Roof_RoundTiles_8x14","Roof_RoundTiles_8x8","Roof_Support2","Roof_Tower_RoundTiles","Roof_Wooden_2x1","Roof_Wooden_2x1_Center","Roof_Wooden_2x1_Center_Mirror","Roof_Wooden_2x1_Corner","Roof_Wooden_2x1_L","Roof_Wooden_2x1_Middle","Roof_Wooden_2x1_R",
"Stair_Interior_Rails","Stair_Interior_Simple","Stair_Interior_Solid","Stair_Interior_SolidExtended","Stairs_Exterior_NoFirstStep","Stairs_Exterior_Platform","Stairs_Exterior_Platform45","Stairs_Exterior_Platform45Clean","Stairs_Exterior_PlatformU","Stairs_Exterior_SidePlatform","Stairs_Exterior_Sides","Stairs_Exterior_Sides45","Stairs_Exterior_SidesU","Stairs_Exterior_SingleSide","Stairs_Exterior_SingleSideThick","Stairs_Exterior_Straight","Stairs_Exterior_Straight_Center","Stairs_Exterior_Straight_L","Stairs_Exterior_Straight_R",
"Wall_Arch","Wall_BottomCover","Wall_Plaster_Door_Flat","Wall_Plaster_Door_Round","Wall_Plaster_Door_RoundInset","Wall_Plaster_Straight","Wall_Plaster_Straight_Base","Wall_Plaster_Straight_L","Wall_Plaster_Straight_R","Wall_Plaster_Window_Thin_Round","Wall_Plaster_Window_Wide_Flat","Wall_Plaster_Window_Wide_Flat2","Wall_Plaster_Window_Wide_Round","Wall_Plaster_WoodGrid","Wall_UnevenBrick_Door_Flat","Wall_UnevenBrick_Door_Round","Wall_UnevenBrick_Straight","Wall_UnevenBrick_Window_Thin_Round","Wall_UnevenBrick_Window_Wide_Flat","Wall_UnevenBrick_Window_Wide_Round",
"Window_Roof_Thin","Window_Roof_Wide","Window_Thin_Flat1","Window_Thin_Round1","Window_Wide_Flat1","Window_Wide_Round1","WindowShutters_Thin_Flat_Closed","WindowShutters_Thin_Flat_Open","WindowShutters_Thin_Round_Closed","WindowShutters_Thin_Round_Open","WindowShutters_Wide_Flat_Closed","WindowShutters_Wide_Flat_Open","WindowShutters_Wide_Round_Closed","WindowShutters_Wide_Round_Open"
];
</script>
</body>
</html>
