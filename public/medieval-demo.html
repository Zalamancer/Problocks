<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medieval House — 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:sans-serif; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:rgba(0,0,0,.65);
  color:#e8d5a3; z-index:10; gap:10px; cursor:pointer;
}
#overlay h2 { font-size:22px; font-weight:700; letter-spacing:.04em; }
#overlay p  { font-size:13px; color:#a89060; }
#crosshair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:18px; height:18px; pointer-events:none; display:none; z-index:5;
}
#crosshair::before,#crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,.7);
}
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%;  transform:translateY(-50%); }
#hud {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.45); font-size:11px; letter-spacing:.06em;
  pointer-events:none; display:none; z-index:5;
}
</style>
</head>
<body>
<div id="overlay">
  <h2>Medieval House</h2>
  <p>Click to explore &nbsp;·&nbsp; WASD move &nbsp;·&nbsp; Mouse look &nbsp;·&nbsp; ESC pause</p>
</div>
<div id="crosshair"></div>
<div id="hud">WASD · MOVE &nbsp;&nbsp; MOUSE · LOOK &nbsp;&nbsp; ESC · PAUSE</div>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
// ─── Scene ────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.fog      = new THREE.FogExp2(0x0a0e18, 0.038);
scene.background = new THREE.Color(0x0a0e18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 300);
camera.position.set(0, 1.7, 9);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Pointer-lock + WASD ─────────────────────────────────────────────────
const overlay   = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
const hud       = document.getElementById('hud');
const keys = {};
let locked = false;
let yaw = 0, pitch = 0;

overlay.addEventListener('click', () => renderer.domElement.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  overlay.style.display   = locked ? 'none' : 'flex';
  crosshair.style.display = locked ? 'block' : 'none';
  hud.style.display       = locked ? 'block' : 'none';
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw   -= e.movementX * 0.002;
  pitch  = Math.max(-1.2, Math.min(1.2, pitch - e.movementY * 0.002));
});

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── Procedural textures ─────────────────────────────────────────────────
function makeStoneTexture(size) {
  size = size || 256;
  var c = document.createElement('canvas');
  c.width = c.height = size;
  var x = c.getContext('2d');
  x.fillStyle = '#5a5040'; x.fillRect(0, 0, size, size);
  var rng = 7919;
  var r = function(mn, mx) { rng = (rng * 16807) % 2147483647; return mn + (rng / 2147483647) * (mx - mn); };
  var y0 = 2;
  while (y0 < size) {
    var rh = Math.floor(r(14, 22));
    var x0 = y0 % 2 === 0 ? 0 : Math.floor(r(-10, 10));
    while (x0 < size) {
      var sw = Math.floor(r(30, 55));
      var gr = Math.floor(r(68, 98)), gg = Math.floor(r(60, 88)), gb = Math.floor(r(50, 78));
      x.fillStyle = 'rgb(' + gr + ',' + gg + ',' + gb + ')';
      x.fillRect(x0 + 1, y0 + 1, Math.min(sw, size - x0) - 2, rh - 2);
      x.fillStyle = 'rgba(255,255,255,0.06)';
      x.fillRect(x0 + 1, y0 + 1, Math.min(sw, size - x0) - 2, 2);
      x.fillStyle = 'rgba(0,0,0,0.25)';
      x.fillRect(x0 + 1, y0 + rh - 4, Math.min(sw, size - x0) - 2, 3);
      x0 += sw + 2;
    }
    y0 += rh + 2;
  }
  var t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function makeThatchTexture(size) {
  size = size || 256;
  var c = document.createElement('canvas'); c.width = c.height = size;
  var x = c.getContext('2d');
  x.fillStyle = '#6b4a18'; x.fillRect(0, 0, size, size);
  var rng = 13337;
  var r = function(mn, mx) { rng = (rng * 16807) % 2147483647; return mn + (rng / 2147483647) * (mx - mn); };
  for (var i = 0; i < 80; i++) {
    var ly = r(0, size), lx = r(-20, size);
    x.strokeStyle = 'rgba(' + Math.floor(r(90,140)) + ',' + Math.floor(r(60,100)) + ',' + Math.floor(r(10,30)) + ',0.5)';
    x.lineWidth = r(1.5, 3.5);
    x.setLineDash([r(15, 35), r(4, 10)]);
    x.beginPath(); x.moveTo(lx, ly); x.lineTo(lx + size, ly); x.stroke();
  }
  x.setLineDash([]);
  var t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function makeGrassTexture(size) {
  size = size || 512;
  var c = document.createElement('canvas'); c.width = c.height = size;
  var x = c.getContext('2d');
  x.fillStyle = '#2a5a1e'; x.fillRect(0, 0, size, size);
  var rng = 99991;
  var r = function(mn, mx) { rng = (rng * 16807) % 2147483647; return mn + (rng / 2147483647) * (mx - mn); };
  for (var i = 0; i < 600; i++) {
    x.fillStyle = 'rgba(' + Math.floor(r(20,60)) + ',' + Math.floor(r(70,110)) + ',' + Math.floor(r(15,40)) + ',0.6)';
    x.fillRect(r(0, size), r(0, size), r(3, 10), r(3, 10));
  }
  var t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(24, 24);
  return t;
}

function makeWoodTexture(size) {
  size = size || 128;
  var c = document.createElement('canvas'); c.width = c.height = size;
  var x = c.getContext('2d');
  x.fillStyle = '#4a2e0e'; x.fillRect(0, 0, size, size);
  var rng = 55511;
  var r = function(mn, mx) { rng = (rng * 16807) % 2147483647; return mn + (rng / 2147483647) * (mx - mn); };
  for (var i = 0; i < 20; i++) {
    x.strokeStyle = 'rgba(' + Math.floor(r(30,60)) + ',' + Math.floor(r(18,36)) + ',' + Math.floor(r(5,15)) + ',0.5)';
    x.lineWidth = r(1, 3);
    x.beginPath(); x.moveTo(0, r(0, size)); x.lineTo(size, r(0, size)); x.stroke();
  }
  return new THREE.CanvasTexture(c);
}

var stoneTex = makeStoneTexture(256);
stoneTex.repeat.set(3, 2);
var thatchTex = makeThatchTexture(256);
thatchTex.repeat.set(2, 2);
var grassTex  = makeGrassTexture(512);
var woodTex   = makeWoodTexture(128);

// ─── Materials ────────────────────────────────────────────────────────────
var mStone  = new THREE.MeshStandardMaterial({ map: stoneTex,  roughness: .92, metalness: 0 });
var mThatch = new THREE.MeshStandardMaterial({ map: thatchTex, roughness: .97, metalness: 0 });
var mWood   = new THREE.MeshStandardMaterial({ map: woodTex,   roughness: .9,  metalness: 0, color: 0x5a3810 });
var mGrass  = new THREE.MeshStandardMaterial({ map: grassTex,  roughness: 1,   metalness: 0 });
var mGlass  = new THREE.MeshStandardMaterial({ color: 0x8ab4e8, transparent: true, opacity: .38, roughness: .1, metalness: .2, emissive: 0xffa020, emissiveIntensity: .55 });
var mDark   = new THREE.MeshStandardMaterial({ color: 0x1a0d04, roughness: 1 });

function addBox(w, h, d, mat, parent) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.castShadow = m.receiveShadow = true;
  (parent || scene).add(m);
  return m;
}

// ─── Ground ───────────────────────────────────────────────────────────────
var ground = addBox(200, 0.3, 200, mGrass);
ground.position.y = -0.15;

var pathMat = new THREE.MeshStandardMaterial({ color: 0x7a5c30, roughness: 1 });
var path = addBox(2.4, 0.01, 12, pathMat);
path.position.set(0, 0, 5.5);

// ─── House dimensions ────────────────────────────────────────────────────
var HW = 5.5, HH = 3.6, HD = 5.5;
var group = new THREE.Group();

// Back wall
var bk = addBox(HW, HH, 0.4, mStone, group); bk.position.set(0, HH/2, -HD/2);
// Left wall
var lw = addBox(0.4, HH, HD, mStone, group); lw.position.set(-HW/2, HH/2, 0);
// Right wall
var rw = addBox(0.4, HH, HD, mStone, group); rw.position.set(HW/2, HH/2, 0);

// Front wall (with door + window gaps)
var fwL = addBox(1.4, HH, 0.4, mStone, group); fwL.position.set(-HW/2+0.7,  HH/2,  HD/2);
var fwR = addBox(1.4, HH, 0.4, mStone, group); fwR.position.set( HW/2-0.7,  HH/2,  HD/2);
var fwT = addBox(2.7, 0.9, 0.4, mStone, group); fwT.position.set(0, HH-0.45, HD/2);
var fwW1= addBox(0.6, 2.0, 0.4, mStone, group); fwW1.position.set(-HW/2+2.5, HH/2-0.5, HD/2);
var fwW2= addBox(0.6, 2.0, 0.4, mStone, group); fwW2.position.set( HW/2-2.5, HH/2-0.5, HD/2);
var fwBW1=addBox(1.5, 1.2, 0.4, mStone, group); fwBW1.position.set(-HW/2+2.5, 0.6, HD/2);
var fwBW2=addBox(1.5, 1.2, 0.4, mStone, group); fwBW2.position.set( HW/2-2.5, 0.6, HD/2);
var fwAW1=addBox(1.5, 0.5, 0.4, mStone, group); fwAW1.position.set(-HW/2+2.5, HH-0.25, HD/2);
var fwAW2=addBox(1.5, 0.5, 0.4, mStone, group); fwAW2.position.set( HW/2-2.5, HH-0.25, HD/2);

// Floor + ceiling
var floorMesh = addBox(HW-0.4, 0.12, HD-0.4, new THREE.MeshStandardMaterial({color:0x5a4020,roughness:1}), group);
floorMesh.position.set(0, 0.06, 0);
var ceilMesh  = addBox(HW-0.4, 0.1, HD-0.4, mWood, group);
ceilMesh.position.set(0, HH-0.05, 0);

// Door opening fill
var doorBack = addBox(1.1, 2.1, 0.05, mDark, group); doorBack.position.set(0, 1.05, HD/2+0.01);

// Windows
function addWindow(wx, wy, wz) {
  var g = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.05), mGlass);
  g.position.set(wx, wy, wz); group.add(g);
  var fr1=addBox(1.1,0.08,0.08,mWood,group); fr1.position.set(wx,wy+0.6,wz+0.04);
  var fr2=addBox(1.1,0.08,0.08,mWood,group); fr2.position.set(wx,wy-0.6,wz+0.04);
  var fr3=addBox(0.08,1.2,0.08,mWood,group); fr3.position.set(wx-0.55,wy,wz+0.04);
  var fr4=addBox(0.08,1.2,0.08,mWood,group); fr4.position.set(wx+0.55,wy,wz+0.04);
  var cr1=addBox(1.0,0.06,0.05,mWood,group); cr1.position.set(wx,wy,wz+0.06);
  var cr2=addBox(0.06,1.2,0.05,mWood,group); cr2.position.set(wx,wy,wz+0.06);
}
addWindow(-HW/2+2.5, 1.8, HD/2+0.01);
addWindow( HW/2-2.5, 1.8, HD/2+0.01);
addWindow(-HW/2+0.01, 1.8, 0);
addWindow( HW/2-0.01, 1.8, 0);

// Door frame
var dfL=addBox(0.18,2.3,0.18,mWood,group); dfL.position.set(-0.64,1.15,HD/2);
var dfR=addBox(0.18,2.3,0.18,mWood,group); dfR.position.set( 0.64,1.15,HD/2);
var dfT=addBox(1.46,0.18,0.18,mWood,group); dfT.position.set(0,2.24,HD/2);

// Door (open)
var door=addBox(1.1,2.1,0.08,mWood,group);
door.position.set(-0.64-0.55, 1.05, HD/2-0.02);
door.rotation.y = Math.PI * 0.45;

// Fireplace
var fpBase=addBox(1.6,0.2,0.8,mStone,group); fpBase.position.set(0,0.1,-HD/2+0.7);
var fpL=addBox(0.2,1.4,0.8,mStone,group); fpL.position.set(-0.7,0.9,-HD/2+0.7);
var fpR=addBox(0.2,1.4,0.8,mStone,group); fpR.position.set( 0.7,0.9,-HD/2+0.7);
var fpTop=addBox(1.6,0.2,0.8,mStone,group); fpTop.position.set(0,1.65,-HD/2+0.7);
var firebox=addBox(1.1,0.9,0.4,mDark,group); firebox.position.set(0,0.6,-HD/2+0.5);
var fireMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:2,transparent:true,opacity:.85});
var fire=new THREE.Mesh(new THREE.ConeGeometry(0.25,0.5,6),fireMat);
fire.position.set(0,0.6,-HD/2+0.4); group.add(fire);

// Table
var tableMat=new THREE.MeshStandardMaterial({color:0x6a4520,roughness:.9});
var tableTop=addBox(1.4,0.08,0.8,tableMat,group); tableTop.position.set(-0.8,0.9,0);
[[-1.3,0.45,-0.25],[-0.3,0.45,-0.25],[-1.3,0.45,0.25],[-0.3,0.45,0.25]].forEach(function(pos){
  var leg=addBox(0.1,0.9,0.1,tableMat,group); leg.position.set(pos[0],pos[1],pos[2]);
});

// Chimney
var chimMat=mStone;
var chim=addBox(1.0,3.0,0.9,chimMat,group); chim.position.set(1.2,HH+0.9,-HD/2+0.5);
var chimCap=addBox(1.3,0.15,1.1,chimMat,group); chimCap.position.set(1.2,HH+2.42,-HD/2+0.5);

scene.add(group);

// ─── Roof ────────────────────────────────────────────────────────────────
var roofGroup = new THREE.Group();
roofGroup.position.set(0, HH, 0);
scene.add(roofGroup);

var roofH = 2.2;
var slope  = Math.atan2(roofH, HD/2);
var panelLenFB = Math.sqrt(roofH*roofH + (HD/2)*(HD/2)) + 0.3;
var slopeS = Math.atan2(roofH, HW/2);
var panelLenLR = Math.sqrt(roofH*roofH + (HW/2)*(HW/2)) + 0.3;

function addRoofPanel(w, d, px, pz, ry, rx) {
  var g = new THREE.Mesh(new THREE.BoxGeometry(w, 0.22, d), mThatch);
  g.castShadow = true; g.position.set(px, 0, pz);
  g.rotation.set(rx, ry, 0); roofGroup.add(g);
}
addRoofPanel(HW+1.0, panelLenFB, 0,  HD/2*0.4+0.1,  0, -slope);
addRoofPanel(HW+1.0, panelLenFB, 0, -HD/2*0.4-0.1,  0,  slope);
addRoofPanel(HD+0.6, panelLenLR, -HW/2*0.4-0.1, 0, -Math.PI/2, -slopeS);
addRoofPanel(HD+0.6, panelLenLR,  HW/2*0.4+0.1, 0,  Math.PI/2, -slopeS);

var ridge=new THREE.Mesh(new THREE.BoxGeometry(HW+1.2,0.2,0.2),mWood);
ridge.position.set(0,roofH+0.07,0); ridge.castShadow=true; roofGroup.add(ridge);

[HD/2+0.18,-HD/2-0.18].forEach(function(ez){
  var e=new THREE.Mesh(new THREE.BoxGeometry(HW+1.2,0.16,0.16),mWood);
  e.position.set(0,0,ez); roofGroup.add(e);
});

// ─── Trees ───────────────────────────────────────────────────────────────
function addTree(tx, tz, h) {
  h = h || 4.5;
  var trunkMat=new THREE.MeshStandardMaterial({color:0x5a3a18,roughness:1});
  var leafMat =new THREE.MeshStandardMaterial({color:0x1e5218,roughness:1});
  var trunk=new THREE.Mesh(new THREE.CylinderGeometry(.22,.30,h*.35,8),trunkMat);
  trunk.position.set(tx,h*.175,tz); trunk.castShadow=true; scene.add(trunk);
  [0,.28,.52].forEach(function(off,i){
    var cone=new THREE.Mesh(new THREE.ConeGeometry(h*.28-i*h*.06,h*.35,10),leafMat);
    cone.position.set(tx,h*.35+off*h*.32,tz); cone.castShadow=true; scene.add(cone);
  });
}
addTree(-7,3); addTree(-8,-2); addTree(-7,-6);
addTree(7.5,2); addTree(8.5,-3); addTree(7,7);
addTree(-4,10); addTree(4,11); addTree(0,12);

// ─── Well ────────────────────────────────────────────────────────────────
var wellMat=new THREE.MeshStandardMaterial({color:0x7a6848,roughness:1});
var wellBase=new THREE.Mesh(new THREE.CylinderGeometry(.7,.8,.7,12),wellMat);
wellBase.position.set(5.5,.35,3); wellBase.castShadow=true; scene.add(wellBase);
var wellRim=new THREE.Mesh(new THREE.TorusGeometry(.72,.08,8,18),wellMat);
wellRim.rotation.x=Math.PI/2; wellRim.position.set(5.5,.72,3); scene.add(wellRim);
[[5.1,.85,2.6],[5.9,.85,2.6],[5.1,.85,3.4],[5.9,.85,3.4]].forEach(function(p){
  var post=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.9,6),mWood);
  post.position.set(p[0],p[1],p[2]); scene.add(post);
});
var wellRoof=new THREE.Mesh(new THREE.ConeGeometry(.85,.5,4),mThatch);
wellRoof.position.set(5.5,1.7,3); wellRoof.rotation.y=Math.PI/4; wellRoof.castShadow=true; scene.add(wellRoof);

// ─── Fence ───────────────────────────────────────────────────────────────
function fencePost(px,pz){
  var p=new THREE.Mesh(new THREE.BoxGeometry(.12,.9,.12),mWood);
  p.position.set(px,.45,pz); scene.add(p);
}
function fenceRail(x1,z1,x2,z2){
  var cx=(x1+x2)/2, cz=(z1+z2)/2;
  var len=Math.sqrt((x2-x1)*(x2-x1)+(z2-z1)*(z2-z1));
  var r1=new THREE.Mesh(new THREE.BoxGeometry(len,.08,.08),mWood);
  r1.position.set(cx,.65,cz); r1.rotation.y=Math.atan2(x2-x1,z2-z1); scene.add(r1);
  var r2=r1.clone(); r2.position.y=.35; scene.add(r2);
}
for(var i=-3;i<=3;i++){fencePost(-9,i*2);fencePost(9,i*2);}
for(var j=-2;j<=3;j++){fencePost(j*2,-9);fencePost(j*2,9);}
fenceRail(-9,-6,-9,6); fenceRail(9,-6,9,6);
fenceRail(-6,-9,6,-9); fenceRail(-6,9,6,9);

// ─── Lighting ────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2a4a, 1.2));

var moon=new THREE.DirectionalLight(0x7090d0, 1.4);
moon.position.set(12,20,8);
moon.castShadow=true;
moon.shadow.mapSize.set(2048,2048);
moon.shadow.camera.left=moon.shadow.camera.bottom=-25;
moon.shadow.camera.right=moon.shadow.camera.top=25;
moon.shadow.camera.far=80;
scene.add(moon);

// Window candle glow
[[-HW/2+2.5,1.8,HD/2],[HW/2-2.5,1.8,HD/2],[-HW/2,1.8,0],[HW/2,1.8,0]].forEach(function(p){
  var pl=new THREE.PointLight(0xffaa30,1.2,5); pl.position.set(p[0],p[1],p[2]); scene.add(pl);
});

var firePL=new THREE.PointLight(0xff5500,2.5,4.5);
firePL.position.set(0,0.8,-HD/2+0.4); scene.add(firePL);

var lanternL=new THREE.PointLight(0xffaa30,1.8,6);
lanternL.position.set(-0.9,2.4,HD/2+0.5); scene.add(lanternL);
var lanternR=new THREE.PointLight(0xffaa30,1.8,6);
lanternR.position.set( 0.9,2.4,HD/2+0.5); scene.add(lanternR);

// Stars
var starVerts=[];
for(var s=0;s<600;s++){
  var theta=Math.random()*Math.PI*2, phi=Math.random()*Math.PI*.5;
  starVerts.push(Math.sin(phi)*Math.cos(theta)*120, Math.cos(phi)*80+20, Math.sin(phi)*Math.sin(theta)*120);
}
var stars=new THREE.Points(
  new THREE.BufferGeometry().setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3)),
  new THREE.PointsMaterial({color:0xffffff,size:.12,sizeAttenuation:true})
);
scene.add(stars);

var moonMesh=new THREE.Mesh(new THREE.CircleGeometry(3,32),new THREE.MeshBasicMaterial({color:0xfff8e0,side:THREE.DoubleSide}));
moonMesh.position.set(60,55,-80); scene.add(moonMesh);

// ─── Smoke particles ─────────────────────────────────────────────────────
var SMOKE_COUNT=24;
var smokePositions=new Float32Array(SMOKE_COUNT*3);
var smokePhases=[];
for(var k=0;k<SMOKE_COUNT;k++) smokePhases.push(k/SMOKE_COUNT);
var smokeMat=new THREE.PointsMaterial({color:0x888880,size:0.55,sizeAttenuation:true,transparent:true,opacity:.38});
var smokeGeo=new THREE.BufferGeometry();
smokeGeo.setAttribute('position',new THREE.BufferAttribute(smokePositions,3));
scene.add(new THREE.Points(smokeGeo,smokeMat));

var CHIMNEY_X=1.2, CHIMNEY_Z=-HD/2+0.5;

// ─── Camera movement ─────────────────────────────────────────────────────
var velocity=new THREE.Vector3();
var direction=new THREE.Vector3();
var SPEED=4.5, FRICTION=0.88;

// ─── Animate ─────────────────────────────────────────────────────────────
var clock=new THREE.Clock();
var elapsed=0;

function animate() {
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;

  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  if (locked) {
    direction.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])    direction.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  direction.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  direction.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) direction.x+=1;
    direction.normalize().applyEuler(new THREE.Euler(0,yaw,0));
    velocity.x+=direction.x*SPEED*dt;
    velocity.z+=direction.z*SPEED*dt;
  }
  velocity.multiplyScalar(FRICTION);
  camera.position.x=Math.max(-8.5,Math.min(8.5,camera.position.x+velocity.x));
  camera.position.z=Math.max(-8.5,Math.min(8.5,camera.position.z+velocity.z));
  camera.position.y=1.7;

  // Flicker
  firePL.intensity=2.2+Math.sin(elapsed*7)*0.4+Math.sin(elapsed*13)*0.2;
  fire.scale.y=0.9+Math.sin(elapsed*9)*0.15;
  lanternL.intensity=lanternR.intensity=1.6+Math.sin(elapsed*5.3+1)*0.3;

  // Smoke
  for(var i=0;i<SMOKE_COUNT;i++){
    smokePhases[i]=(smokePhases[i]+dt*0.18)%1;
    var p=smokePhases[i];
    smokePositions[i*3  ]=CHIMNEY_X+Math.sin(elapsed*0.7+i)*0.18*p*4;
    smokePositions[i*3+1]=HH+2.5+p*5;
    smokePositions[i*3+2]=CHIMNEY_Z+Math.cos(elapsed*0.5+i)*0.1*p*3;
  }
  smokeGeo.attributes.position.needsUpdate=true;
  smokeMat.opacity=0.28+Math.sin(elapsed)*0.07;

  renderer.render(scene,camera);
}
animate();
</script>
